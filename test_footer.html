<!DOCTYPE html>
<html>
<head>
    <title>Footer Alignment Test</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        iframe { width: 100%; height: 600px; border: 1px solid #ccc; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Footer Alignment Test</h1>
    <div id="test-results"></div>
    
    <h2>Visual Inspection</h2>
    <p>Verifique visualmente se o formulário e os títulos do footer estão alinhados:</p>
    <iframe src="index.php"></iframe>
    
    <script>
        const results = document.getElementById('test-results');
        
        function addResult(message, isSuccess = true) {
            const div = document.createElement('div');
            div.className = 'test-result ' + (isSuccess ? 'success' : 'error');
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Test if index.php loads
        fetch('index.php')
            .then(response => {
                if (response.ok) {
                    addResult('✅ index.php carrega corretamente');
                } else {
                    addResult('❌ Erro ao carregar index.php', false);
                }
            })
            .catch(error => {
                addResult('❌ Erro de rede: ' + error.message, false);
            });
        
        // Test if footer.php exists
        fetch('includes/footer.php')
            .then(response => {
                if (response.ok) {
                    addResult('✅ footer.php existe e é acessível');
                } else {
                    addResult('❌ footer.php não encontrado', false);
                }
            })
            .catch(error => {
                addResult('❌ Erro ao verificar footer.php: ' + error.message, false);
            });
        
        addResult('✅ Teste de alinhamento criado - verifique visualmente na iframe abaixo');
    </script>
</body>
</html>
